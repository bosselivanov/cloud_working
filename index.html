<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Graph</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="boardViewport" class="board-viewport">
    <div id="board" class="board">
      <svg id="connectionsLayer" class="connections-layer"></svg>
      <div id="cloudLayer" class="cloud-layer"></div>
    </div>
  </div>

  <div class="floating-dock" aria-label="Инструменты">
    <button id="createCloudBtn" class="dock-button dock-button-primary" title="Создать облако">+ Облако</button>
    <button id="centerViewBtn" class="dock-button" title="Сбросить вид">Центр</button>
    <button id="cancelLinkBtn" class="dock-button" title="Отменить связь" disabled>Отмена связи</button>
  </div>

  <div id="linkModeStatus" class="link-status" aria-live="polite">Режим обзора</div>

  <template id="cloudTemplate">
    <section class="cloud-node entity" data-type="cloud">
      <div class="cloud-aurora"></div>
      <div class="cloud-core">
        <div class="cloud-title-wrap">
          <h2 class="editable cloud-title" contenteditable="true" spellcheck="false"></h2>
        </div>
        <div class="cloud-favorites"></div>
        <div class="cloud-details">
          <div class="cloud-tools">
            <button class="tool-button add-task-btn">+ задача</button>
            <button class="tool-button link-btn">связать</button>
          </div>
          <div class="task-list"></div>
        </div>
      </div>
    </section>
  </template>

  <template id="taskTemplate">
    <article class="task-row entity" data-type="task">
      <div class="task-row-main">
        <p class="editable task-title" contenteditable="true" spellcheck="false"></p>
        <div class="task-meta">
          <input class="deadline-input" type="date" aria-label="Дедлайн задачи">
        </div>
      </div>
      <div class="task-row-actions">
        <button class="task-action favorite-btn" title="Избранное">☆</button>
        <button class="task-action link-btn" title="Связать">⟲</button>
        <button class="task-action remove-btn" title="Удалить">×</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
