<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Graph</title>
  <link rel="stylesheet" href="styles.css?v=9">
</head>
<body>
  <div id="boardViewport" class="board-viewport">
    <div id="board" class="board">
      <svg id="boardEdges" class="board-edges"></svg>
      <div id="cloudLayer" class="cloud-layer"></div>
      <div id="sharedLayer" class="shared-layer"></div>
    </div>
  </div>

  <div class="floating-dock" aria-label="Инструменты">
    <button id="createCloudBtn" class="dock-button dock-button-primary">+ Облако</button>
    <button id="createSharedBtn" class="dock-button">+ Общая задача</button>
    <button id="centerViewBtn" class="dock-button">Центр</button>
  </div>

  <div id="cloudStudio" class="cloud-studio" hidden>
    <section class="cloud-studio-panel">
      <header class="studio-header">
        <div class="studio-title-wrap">
          <p class="studio-kicker">Открытое облако</p>
          <h2 id="studioTitle" class="studio-title editable" contenteditable="true" spellcheck="false"></h2>
        </div>
        <div class="studio-actions">
          <button id="addTaskBtn" class="studio-button studio-button-primary">+ задача</button>
          <button id="closeStudioBtn" class="studio-button">Закрыть</button>
        </div>
      </header>

      <div class="studio-meta">
        <span>Перетаскивай узлы внутри облака</span>
        <span>Добавляй подзадачи прямо из узла</span>
        <span>Выноси общие задачи на главную карту</span>
        <span>Тип узла меняется по кнопке роли</span>
        <span>Колесо: масштаб доски</span>
        <span>Пробел + drag: панорама</span>
      </div>

      <div id="sharedRail" class="shared-rail" hidden></div>

      <div id="taskCanvas" class="task-canvas">
        <svg id="taskEdges" class="task-edges"></svg>
        <div id="taskNodes" class="task-nodes"></div>
      </div>
    </section>
  </div>

  <template id="cloudTemplate">
    <article class="cloud-node">
      <div class="cloud-shell">
        <h3 class="cloud-title"></h3>
      </div>
    </article>
  </template>

  <template id="taskTemplate">
    <article class="task-note">
      <div class="task-port task-port-in"></div>
      <div class="task-port task-port-out"></div>
      <div class="task-note-head">
        <span class="task-type-badge"></span>
        <button class="type-cycle-btn" title="Сменить тип">роль</button>
      </div>
      <div class="task-grip"></div>
      <textarea class="task-text" rows="3" spellcheck="false"></textarea>
      <div class="task-footer">
        <input class="deadline-input" type="date" aria-label="Дедлайн">
        <div class="task-buttons">
          <button class="share-task-btn" title="Вынести на карту">↗</button>
          <button class="spawn-task-btn" title="Подзадача">+</button>
          <button class="remove-task-btn" title="Удалить">×</button>
        </div>
      </div>
    </article>
  </template>

  <template id="sharedTemplate">
    <article class="shared-note">
      <div class="shared-port shared-port-in"></div>
      <div class="shared-port shared-port-out"></div>
      <div class="shared-note-head">
        <span class="shared-type-badge"></span>
        <button class="shared-picker-toggle-btn" title="Привязать облака">облака</button>
      </div>
      <textarea class="shared-text" rows="3" spellcheck="false"></textarea>
      <div class="shared-clouds"></div>
      <div class="shared-footer">
        <input class="shared-deadline-input" type="date" aria-label="Дедлайн общей задачи">
        <div class="shared-buttons">
          <button class="shared-type-cycle-btn" title="Сменить роль">роль</button>
          <button class="shared-remove-btn" title="Удалить">×</button>
        </div>
      </div>
      <div class="shared-cloud-picker" hidden></div>
    </article>
  </template>

  <script src="app.js?v=9"></script>
</body>
</html>
